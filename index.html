<!doctype html>
<html lang="fr">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#123142" />
    <title>Fiche d'inventaire GECAF</title>
    <link rel="icon" href="data:," />
    <link rel="manifest" href="manifest.webmanifest?v=28" />
    <link rel="stylesheet" href="styles.css?v=28" />
  </head>
  <body>
    <main class="app">
      <section class="login-view" id="loginView">
        <div class="login-card">
          <div class="login-brand">
            <div class="login-mark" aria-hidden="true">G</div>
            <div>
              <p class="eyebrow">GECAF Inventaire</p>
              <h1>Acces terrain</h1>
            </div>
          </div>
          <p class="muted">Equipe et agent autorises uniquement.</p>

          <form id="loginForm" class="form-stack" autocomplete="off">
            <label>
              Equipe
              <input name="team" autocomplete="off" autocapitalize="words" placeholder="Equipe 1" required />
            </label>
            <label>
              Agent
              <input name="agent" autocomplete="off" autocapitalize="words" placeholder="Nom de l'agent" required />
            </label>
            <button class="primary-button" type="submit">Ouvrir la fiche</button>
          </form>
        </div>
      </section>

      <section class="sheet-view" id="sheetView" aria-label="Fiche d'inventaire">
        <section class="sheet-wrap" id="sheetWrap" aria-label="Grille de saisie identique a la fiche Excel">
          <div class="sheet-stage" id="sheetStage">
            <div class="excel-sheet" id="sheetGrid"></div>
          </div>
        </section>

        <div class="zoom-tools" aria-label="Zoom fiche">
          <button class="zoom-button" type="button" id="zoomOutButton" title="Dezoomer" aria-label="Dezoomer">-</button>
          <button class="zoom-button is-wide" type="button" id="zoomFitButton" title="Voir la largeur de la fiche" aria-label="Voir la largeur de la fiche">Vue</button>
          <button class="zoom-button" type="button" id="zoomInButton" title="Zoomer" aria-label="Zoomer">+</button>
        </div>
        <button class="edit-pill" type="button" id="editCellButton">Modifier</button>

        <div class="floating-tools" aria-label="Actions hors fiche">
          <button class="tool-button" type="button" id="backToLogin">Equipe</button>
          <button class="tool-button admin-tool" type="button" id="adminButton">Admin</button>
          <button class="tool-button" type="button" id="newSheetButton">Nouvelle fiche</button>
          <button class="tool-button" type="button" id="archivesButton">Archives</button>
          <button class="tool-button" type="button" id="exportPdfButton">PDF</button>
          <button class="tool-button" type="button" id="exportExcelButton">Excel</button>
          <span class="sync-badge" id="syncBadge">Local</span>
        </div>
        <button class="fab" type="button" id="addRowButton" aria-label="Nouvel enregistrement">+</button>
      </section>
    </main>

    <div class="editor" id="cellEditor" aria-hidden="true">
      <div class="editor-backdrop" data-close-editor></div>
      <section class="editor-panel" role="dialog" aria-modal="true" aria-labelledby="editorTitle">
        <div class="editor-handle"></div>
        <div class="editor-heading">
          <div>
            <p class="eyebrow" id="editorPosition">Ligne 1</p>
            <h2 id="editorTitle">Champ</h2>
          </div>
          <button class="icon-button dark" type="button" data-close-editor aria-label="Fermer">X</button>
        </div>
        <div id="editorControl" class="editor-control"></div>
        <div class="editor-actions">
          <button class="ghost-button" type="button" id="previousCell">Precedent</button>
          <button class="primary-button" type="button" id="nextCell">Suivant</button>
        </div>
      </section>
    </div>

    <div class="archives" id="archivesPanel" aria-hidden="true">
      <div class="editor-backdrop" data-close-archives></div>
      <section class="archives-panel" role="dialog" aria-modal="true" aria-labelledby="archivesTitle">
        <div class="editor-handle"></div>
        <div class="editor-heading">
          <div>
            <p class="eyebrow">Fiches</p>
            <h2 id="archivesTitle">Archives</h2>
          </div>
          <button class="icon-button dark" type="button" data-close-archives aria-label="Fermer">X</button>
        </div>
        <div id="archivesList" class="archives-list"></div>
      </section>
    </div>

    <div class="admin" id="adminPanel" aria-hidden="true">
      <div class="editor-backdrop" data-close-admin></div>
      <section class="admin-panel" role="dialog" aria-modal="true" aria-labelledby="adminTitle">
        <div class="editor-heading">
          <div>
            <p class="eyebrow">Administration</p>
            <h2 id="adminTitle">Pilotage terrain</h2>
          </div>
          <button class="icon-button dark" type="button" data-close-admin aria-label="Fermer">X</button>
        </div>

        <div class="admin-toolbar">
          <div class="admin-metrics" aria-label="Vue generale">
            <div>
              <strong id="adminTeamCount">0</strong>
              <span>equipes actives</span>
            </div>
            <div>
              <strong id="adminUserCount">0</strong>
              <span>utilisateurs actifs</span>
            </div>
            <div>
              <strong id="adminArchiveCount">0</strong>
              <span>fiches visibles</span>
            </div>
          </div>
          <label class="admin-search">
            Rechercher
            <input id="adminSearch" type="search" placeholder="Equipe, agent, agence..." autocomplete="off" />
          </label>
        </div>

        <div class="admin-workspace">
          <section class="admin-column">
            <div class="admin-column-heading">
              <h3>Equipes</h3>
              <span id="adminTeamsMeta">0 element</span>
            </div>
            <form id="teamForm" class="admin-inline-form">
              <label>
                Nom de l'equipe
                <input name="teamName" placeholder="Equipe 1" required />
              </label>
              <button class="primary-button compact" type="submit">Ajouter</button>
            </form>
            <div id="adminTeamsList" class="admin-list"></div>
          </section>

          <section class="admin-column">
            <div class="admin-column-heading">
              <h3>Utilisateurs</h3>
              <span id="adminUsersMeta">0 element</span>
            </div>
            <form id="userForm" class="admin-inline-form user-inline-form">
              <label>
                Equipe
                <input name="teamName" placeholder="Equipe 1" required />
              </label>
              <label>
                Agent
                <input name="agentName" placeholder="Nom de l'agent" required />
              </label>
              <button class="primary-button compact" type="submit">Ajouter</button>
            </form>
            <div id="adminUsersList" class="admin-list"></div>
          </section>

          <section class="admin-column admin-column-wide">
            <div class="admin-column-heading">
              <h3>Fiches et archives</h3>
              <span id="adminArchivesMeta">0 element</span>
            </div>
            <div id="adminArchivesList" class="admin-list"></div>
          </section>
        </div>
      </section>
    </div>

    <template id="emptyCellTemplate">
      <span class="cell-empty">Toucher pour renseigner</span>
    </template>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="supabase-config.js?v=28"></script>
    <script src="app.js?v=28"></script>
  </body>
</html>
