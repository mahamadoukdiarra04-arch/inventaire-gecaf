<!doctype html>
<html lang="fr">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>Reparation acces GECAF</title>
    <style>
      :root {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        color: #14202a;
        background: #f7fbfd;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 1rem;
      }

      main {
        width: min(440px, 100%);
        border: 1px solid #a6a6a6;
        border-radius: 8px;
        padding: 1rem;
        background: #fff;
      }

      h1 {
        margin: 0 0 0.75rem;
        font-size: 1.35rem;
      }

      p {
        line-height: 1.45;
      }

      button {
        width: 100%;
        min-height: 46px;
        border: 0;
        border-radius: 7px;
        color: #fff;
        font: inherit;
        font-weight: 800;
        background: #1f4e79;
      }

      .status {
        color: #687682;
        font-size: 0.9rem;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Reparation de l'acces</h1>
      <p>
        Cette action repare uniquement le cache de l'application. Elle ne supprime pas les saisies offline de
        l'inventaire.
      </p>
      <p class="status" id="status">Pret.</p>
      <button type="button" id="repairButton">Reparer et rouvrir</button>
    </main>

    <script>
      const statusNode = document.getElementById("status");
      const button = document.getElementById("repairButton");

      button.addEventListener("click", repair);

      async function repair() {
        button.disabled = true;
        statusNode.textContent = "Reparation en cours...";

        try {
          if ("serviceWorker" in navigator) {
            const registrations = await navigator.serviceWorker.getRegistrations();
            await Promise.all(registrations.map((registration) => registration.unregister()));
          }

          if ("caches" in window) {
            const names = await caches.keys();
            await Promise.all(names.filter((name) => name.startsWith("gecaf-inv-")).map((name) => caches.delete(name)));
          }

          statusNode.textContent = "Reparation terminee. Ouverture...";
          window.location.replace("/?repaired=" + Date.now());
        } catch (error) {
          statusNode.textContent = "Reparation partielle. Essayez de rouvrir l'application.";
          button.disabled = false;
        }
      }
    </script>
  </body>
</html>
